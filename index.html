<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PULSE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js?v=0.1.1"></script>
</head>
<body>
    <div id="app">
        <div class="user-card">
            <img id="user-photo" src="" alt="" class="avatar">
            <span id="user-name">Загрузка...</span>
        </div>
        
        <div class="stats-container">
            <div class="circle-progress">
                <div class="inner-circle">
                    <h1 id="step-count">0</h1>
                    <p>ШАГОВ</p>
                </div>
            </div>
        </div>

        <div class="buttons-grid">
            <button id="double-btn" class="main-btn btn-neon">Удвоить шаги (x2)</button>
            <button id="bonus-btn" class="main-btn btn-glass">Ежедневный бонус</button>
        </div>
    </div>
    <script src="app.js?v=final_fix"></script>
</body>
</html>
